<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Map/parchment -->
    <rect x="-40" y="-35" width="80" height="70" rx="3" fill="#E8DCC8" stroke="#8B7534" stroke-width="2"/>
    <!-- Rolled edges -->
    <ellipse cx="-40" cy="0" rx="5" ry="37" fill="#E8DCC8" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Map lines (roads/coastline) -->
    <path d="M-30,-20 Q-10,-10 10,-25 Q30,-15 35,5" fill="none" stroke="#2C1810" stroke-width="1.5" opacity="0.5"/>
    <path d="M-25,5 Q0,15 25,5" fill="none" stroke="#2C1810" stroke-width="1.5" opacity="0.5"/>
    <!-- X marks -->
    <text x="15" y="20" font-size="18" fill="#8B1A1A" font-weight="bold">X</text>
    <!-- Compass -->
    <circle cx="-20" cy="15" r="8" fill="none" stroke="#2C1810" stroke-width="1" opacity="0.4"/>
    <line x1="-20" y1="8" x2="-20" y2="22" stroke="#2C1810" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
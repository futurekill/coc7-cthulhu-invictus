<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Laurel wreath (represents services/people) -->
    <path d="M0,-55 Q-35,-50 -45,-20 Q-50,10 -35,35 Q-15,55 0,50" fill="none" stroke="#C4A035" stroke-width="5" stroke-linecap="round"/>
    <path d="M0,-55 Q35,-50 45,-20 Q50,10 35,35 Q15,55 0,50" fill="none" stroke="#C4A035" stroke-width="5" stroke-linecap="round"/>
    <!-- Leaves -->
    <g fill="#C4A035" opacity="0.7">
      <ellipse cx="-35" cy="-35" rx="8" ry="4" transform="rotate(-30,-35,-35)"/>
      <ellipse cx="-45" cy="-5" rx="8" ry="4" transform="rotate(-10,-45,-5)"/>
      <ellipse cx="-42" cy="20" rx="8" ry="4" transform="rotate(15,-42,20)"/>
      <ellipse cx="35" cy="-35" rx="8" ry="4" transform="rotate(30,35,-35)"/>
      <ellipse cx="45" cy="-5" rx="8" ry="4" transform="rotate(10,45,-5)"/>
      <ellipse cx="42" cy="20" rx="8" ry="4" transform="rotate(-15,42,20)"/>
    </g>
    <!-- Ribbon at bottom -->
    <path d="M-5,50 L-10,65 M5,50 L10,65" fill="none" stroke="#8B1A1A" stroke-width="3"/>
  </g>
</svg>
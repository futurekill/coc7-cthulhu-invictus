<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Oil lamp -->
    <ellipse cx="0" cy="10" rx="30" ry="18" fill="#C4A035" stroke="#8B7534" stroke-width="2"/>
    <!-- Spout -->
    <path d="M-30,5 L-45,0 L-45,12 L-30,15" fill="#C4A035" stroke="#8B7534" stroke-width="2"/>
    <!-- Handle -->
    <path d="M30,5 Q45,-5 40,-15 Q35,-25 25,-20" fill="none" stroke="#C4A035" stroke-width="4"/>
    <!-- Flame -->
    <path d="M-45,0 Q-50,-20 -45,-30 Q-42,-20 -38,-30 Q-35,-15 -45,0" fill="#FF8C00" opacity="0.9"/>
    <path d="M-45,-5 Q-47,-18 -45,-25 Q-43,-15 -45,-5" fill="#FFD700" opacity="0.8"/>
    <!-- Glow -->
    <circle cx="-45" cy="-15" r="18" fill="#FF8C00" opacity="0.15"/>
  </g>
</svg>
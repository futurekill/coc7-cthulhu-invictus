<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Scroll -->
    <rect x="-35" y="-40" width="60" height="80" rx="3" fill="#E8DCC8" stroke="#8B7534" stroke-width="2"/>
    <!-- Rolled ends -->
    <ellipse cx="-35" cy="0" rx="6" ry="42" fill="#E8DCC8" stroke="#8B7534" stroke-width="2"/>
    <ellipse cx="25" cy="0" rx="6" ry="42" fill="#E8DCC8" stroke="#8B7534" stroke-width="2"/>
    <!-- Text lines -->
    <line x1="-25" y1="-25" x2="15" y2="-25" stroke="#2C1810" stroke-width="1.5" opacity="0.4"/>
    <line x1="-25" y1="-15" x2="15" y2="-15" stroke="#2C1810" stroke-width="1.5" opacity="0.4"/>
    <line x1="-25" y1="-5" x2="15" y2="-5" stroke="#2C1810" stroke-width="1.5" opacity="0.4"/>
    <line x1="-25" y1="5" x2="10" y2="5" stroke="#2C1810" stroke-width="1.5" opacity="0.4"/>
    <line x1="-25" y1="15" x2="15" y2="15" stroke="#2C1810" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
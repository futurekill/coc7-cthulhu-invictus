<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Generic item - Roman coin -->
    <circle cx="0" cy="0" r="40" fill="#C4A035" stroke="#8B7534" stroke-width="3"/>
    <circle cx="0" cy="0" r="33" fill="none" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Profile head -->
    <path d="M-5,-20 Q-15,-15 -15,0 Q-15,10 -5,15 Q0,18 5,15 Q10,10 8,0 Q8,-10 0,-20 Z"
          fill="#8B7534" opacity="0.5"/>
    <!-- SPQR text -->
    <text x="0" y="35" text-anchor="middle" font-size="12" fill="#8B7534" font-family="serif">SPQR</text>
  </g>
</svg>
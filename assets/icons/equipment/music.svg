<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Lyre/horn -->
    <path d="M-25,30 Q-30,-10 -15,-40 Q0,-55 15,-40 Q30,-10 25,30" fill="none" stroke="#C4A035" stroke-width="5" stroke-linecap="round"/>
    <!-- Crossbar -->
    <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#C4A035" stroke-width="4"/>
    <!-- Strings -->
    <line x1="-12" y1="-20" x2="-12" y2="30" stroke="#E8DCC8" stroke-width="1"/>
    <line x1="0" y1="-20" x2="0" y2="30" stroke="#E8DCC8" stroke-width="1"/>
    <line x1="12" y1="-20" x2="12" y2="30" stroke="#E8DCC8" stroke-width="1"/>
    <!-- Base -->
    <rect x="-25" y="28" width="50" height="8" rx="3" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
  </g>
</svg>
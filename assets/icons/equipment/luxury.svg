<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Gem/jewelry -->
    <path d="M0,-40 L-30,-10 L-20,30 L20,30 L30,-10 Z" fill="#8B1A1A" stroke="#C4A035" stroke-width="2.5"/>
    <!-- Facets -->
    <line x1="0" y1="-40" x2="-20" y2="30" stroke="#C4A035" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-40" x2="20" y2="30" stroke="#C4A035" stroke-width="1" opacity="0.5"/>
    <line x1="-30" y1="-10" x2="20" y2="30" stroke="#C4A035" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="-10" x2="-20" y2="30" stroke="#C4A035" stroke-width="1" opacity="0.5"/>
    <!-- Sparkle -->
    <circle cx="5" cy="-15" r="3" fill="white" opacity="0.6"/>
  </g>
</svg>
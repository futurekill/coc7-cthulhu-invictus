<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Chariot/cart body -->
    <rect x="-40" y="-20" width="60" height="30" rx="5" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Wheel -->
    <circle cx="30" cy="25" r="22" fill="none" stroke="#8B6914" stroke-width="5"/>
    <circle cx="30" cy="25" r="4" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Spokes -->
    <line x1="30" y1="3" x2="30" y2="47" stroke="#8B6914" stroke-width="2"/>
    <line x1="8" y1="25" x2="52" y2="25" stroke="#8B6914" stroke-width="2"/>
    <!-- Hitch -->
    <line x1="-40" y1="-5" x2="-60" y2="-15" stroke="#8B6914" stroke-width="4"/>
  </g>
</svg>
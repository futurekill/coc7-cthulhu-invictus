<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Speaking figure silhouette with raised hand -->
    <circle cx="0" cy="-40" r="15" fill="#E8DCC8" stroke="#8B7534" stroke-width="2"/>
    <path d="M-15,-25 L-20,30 L20,30 L15,-25" fill="#E8DCC8" stroke="#8B7534" stroke-width="2"/>
    <!-- Raised arm -->
    <path d="M15,-15 Q35,-25 30,-45" fill="none" stroke="#E8DCC8" stroke-width="5" stroke-linecap="round"/>
    <!-- Speech waves -->
    <path d="M-25,-45 Q-35,-45 -35,-35" fill="none" stroke="#C4A035" stroke-width="2" opacity="0.6"/>
    <path d="M-30,-50 Q-45,-50 -45,-35" fill="none" stroke="#C4A035" stroke-width="2" opacity="0.4"/>
    <path d="M-35,-55 Q-55,-55 -55,-35" fill="none" stroke="#C4A035" stroke-width="2" opacity="0.2"/>
  </g>
</svg>
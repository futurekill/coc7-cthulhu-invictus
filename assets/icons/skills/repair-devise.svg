<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Gear -->
    <circle cx="0" cy="0" r="25" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#3D2B1F" stroke="#667788" stroke-width="2"/>
    <!-- Gear teeth -->
    <g fill="#8899AA" stroke="#667788" stroke-width="1">
      <rect x="-6" y="-32" width="12" height="10" rx="1"/>
      <rect x="-6" y="22" width="12" height="10" rx="1"/>
      <rect x="-32" y="-6" width="10" height="12" rx="1"/>
      <rect x="22" y="-6" width="10" height="12" rx="1"/>
      <rect x="15" y="-28" width="10" height="12" rx="1" transform="rotate(45,20,-22)"/>
      <rect x="-25" y="16" width="10" height="12" rx="1" transform="rotate(45,-20,22)"/>
      <rect x="15" y="16" width="10" height="12" rx="1" transform="rotate(-45,20,22)"/>
      <rect x="-25" y="-28" width="10" height="12" rx="1" transform="rotate(-45,-20,-22)"/>
    </g>
    <!-- Wrench -->
    <line x1="15" y1="15" x2="50" y2="50" stroke="#C4A035" stroke-width="5" stroke-linecap="round"/>
    <path d="M45,50 Q55,45 55,55 Q50,60 45,55 Z" fill="#C4A035" stroke="#8B7534" stroke-width="1"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Roman galley -->
    <path d="M-50,10 Q-45,30 0,35 Q45,30 50,10 L40,10 L-40,10 Z" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Hull detail -->
    <path d="M-50,10 L-55,5" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
    <!-- Mast -->
    <line x1="0" y1="10" x2="0" y2="-45" stroke="#8B6914" stroke-width="4"/>
    <!-- Sail -->
    <path d="M-30,-40 Q0,-30 30,-40 L25,-10 Q0,0 -25,-10 Z" fill="#E8DCC8" stroke="#8B7534" stroke-width="1.5" opacity="0.85"/>
    <!-- Waves -->
    <path d="M-60,35 Q-40,28 -20,35 Q0,42 20,35 Q40,28 60,35" fill="none" stroke="#3A6A9B" stroke-width="2.5" opacity="0.6"/>
  </g>
</svg>
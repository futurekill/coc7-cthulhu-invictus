<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Eagle standard (aquila) -->
    <rect x="-3" y="-10" width="6" height="70" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Eagle wings spread -->
    <path d="M0,-45 Q-35,-50 -50,-35 Q-40,-30 -25,-35 Q-15,-30 0,-35 Z" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <path d="M0,-45 Q35,-50 50,-35 Q40,-30 25,-35 Q15,-30 0,-35 Z" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Eagle body -->
    <ellipse cx="0" cy="-35" rx="8" ry="12" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Eagle head -->
    <circle cx="0" cy="-48" r="6" fill="#C4A035" stroke="#8B7534" stroke-width="1"/>
    <path d="M0,-52 L8,-52 L0,-48" fill="#8B7534"/>
    <!-- Crossbar -->
    <rect x="-25" y="-12" width="50" height="5" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1"/>
    <!-- SPQR plate -->
    <rect x="-18" y="-8" width="36" height="14" rx="2" fill="#8B1A1A" stroke="#C4A035" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" font-size="11" fill="#C4A035" font-family="serif">SPQR</text>
  </g>
</svg>
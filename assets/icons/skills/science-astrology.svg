<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Night sky circle -->
    <circle cx="0" cy="0" r="48" fill="#0A0A2A" stroke="#C4A035" stroke-width="2"/>
    <!-- Stars -->
    <g fill="#FFD700">
      <circle cx="-20" cy="-25" r="2.5"/><circle cx="15" cy="-30" r="2"/>
      <circle cx="-30" cy="5" r="2"/><circle cx="25" cy="10" r="2.5"/>
      <circle cx="-10" cy="20" r="1.5"/><circle cx="10" cy="-10" r="2"/>
      <circle cx="-25" cy="-35" r="1.5"/><circle cx="30" cy="-15" r="1.5"/>
      <circle cx="0" cy="30" r="2"/><circle cx="-35" cy="-15" r="1.5"/>
    </g>
    <!-- Constellation lines -->
    <g stroke="#C4A035" stroke-width="1" opacity="0.4">
      <line x1="-20" y1="-25" x2="10" y2="-10"/>
      <line x1="10" y1="-10" x2="25" y2="10"/>
      <line x1="15" y1="-30" x2="10" y2="-10"/>
      <line x1="-30" y1="5" x2="-10" y2="20"/>
    </g>
    <!-- Crescent moon -->
    <path d="M30,-30 Q45,-20 30,0 Q38,-10 38,-20 Z" fill="#E8DCC8" opacity="0.8"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Wax tablet -->
    <rect x="-30" y="-40" width="60" height="80" rx="4" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <rect x="-24" y="-34" width="48" height="68" rx="2" fill="#3D3020"/>
    <!-- Scratched text -->
    <g stroke="#E8DCC8" stroke-width="1.2" opacity="0.6">
      <line x1="-18" y1="-22" x2="18" y2="-22"/>
      <line x1="-18" y1="-12" x2="15" y2="-12"/>
      <line x1="-18" y1="-2" x2="18" y2="-2"/>
      <line x1="-18" y1="8" x2="12" y2="8"/>
      <line x1="-18" y1="18" x2="18" y2="18"/>
    </g>
    <!-- Stylus -->
    <line x1="20" y1="45" x2="40" y2="-5" stroke="#8899AA" stroke-width="3" stroke-linecap="round"/>
    <polygon points="40,-5 37,-12 43,-12" fill="#8899AA"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Hooded figure silhouette -->
    <path d="M0,-55 Q-30,-45 -35,-20 Q-38,5 -30,15 L-25,45 L25,45 L30,15 Q38,5 35,-20 Q30,-45 0,-55 Z" fill="#2C1810" stroke="#5C4033" stroke-width="2" opacity="0.85"/>
    <!-- Hood opening -->
    <path d="M-15,-30 Q0,-20 15,-30" fill="#2C1810" opacity="0.5"/>
    <!-- Glowing eyes -->
    <circle cx="-8" cy="-25" r="3" fill="#8B1A1A" opacity="0.8"/>
    <circle cx="8" cy="-25" r="3" fill="#8B1A1A" opacity="0.8"/>
    <!-- Dagger -->
    <path d="M20,20 L30,-10 L35,-10 L25,20 Z" fill="#8899AA" stroke="#667788" stroke-width="1"/>
    <rect x="20" y="20" width="15" height="5" rx="1" fill="#C4A035"/>
  </g>
</svg>
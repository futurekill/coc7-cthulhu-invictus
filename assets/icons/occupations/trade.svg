<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Anvil -->
    <path d="M-35,10 L-25,-15 L25,-15 L35,10 L25,15 L-25,15 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <rect x="-15" y="15" width="30" height="30" rx="2" fill="#667788" stroke="#667788" stroke-width="1"/>
    <!-- Horn -->
    <path d="M-35,5 L-50,0 L-50,5 L-35,10" fill="#8899AA" stroke="#667788" stroke-width="1.5"/>
    <!-- Hammer -->
    <rect x="10" y="-55" width="8" height="45" rx="3" fill="#8B6914" stroke="#5C4033" stroke-width="1.5" transform="rotate(20,14,-32)"/>
    <rect x="0" y="-60" width="28" height="15" rx="3" fill="#8899AA" stroke="#667788" stroke-width="1.5" transform="rotate(20,14,-52)"/>
    <!-- Sparks -->
    <circle cx="-5" cy="-10" r="2" fill="#FFD700" opacity="0.8"/>
    <circle cx="5" cy="-18" r="1.5" fill="#FFD700" opacity="0.7"/>
    <circle cx="-10" cy="-20" r="1.5" fill="#FFD700" opacity="0.6"/>
  </g>
</svg>
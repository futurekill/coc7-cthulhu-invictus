<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Roman column/pillar -->
    <rect x="-12" y="-40" width="24" height="75" fill="#E8DCC8" stroke="#8B7534" stroke-width="2"/>
    <!-- Column fluting -->
    <line x1="-6" y1="-38" x2="-6" y2="33" stroke="#8B7534" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-38" x2="0" y2="33" stroke="#8B7534" stroke-width="1" opacity="0.3"/>
    <line x1="6" y1="-38" x2="6" y2="33" stroke="#8B7534" stroke-width="1" opacity="0.3"/>
    <!-- Capital -->
    <rect x="-20" y="-48" width="40" height="10" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <path d="M-18,-48 Q-15,-55 -10,-48" fill="none" stroke="#C4A035" stroke-width="2"/>
    <path d="M10,-48 Q15,-55 18,-48" fill="none" stroke="#C4A035" stroke-width="2"/>
    <!-- Base -->
    <rect x="-18" y="33" width="36" height="8" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <rect x="-22" y="39" width="44" height="8" rx="2" fill="#8B7534" stroke="#8B7534" stroke-width="1"/>
  </g>
</svg>
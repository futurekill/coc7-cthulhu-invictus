<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Altar/temple pedestal -->
    <rect x="-35" y="15" width="70" height="40" rx="3" fill="#8B7534" stroke="#C4A035" stroke-width="2"/>
    <rect x="-40" y="10" width="80" height="10" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Sacred flame -->
    <path d="M0,10 Q-15,-15 -8,-35 Q-3,-50 0,-55 Q3,-50 8,-35 Q15,-15 0,10 Z" fill="#FF8C00" opacity="0.9"/>
    <path d="M0,5 Q-8,-10 -4,-28 Q0,-40 4,-28 Q8,-10 0,5 Z" fill="#FFD700" opacity="0.8"/>
    <path d="M0,0 Q-3,-8 0,-20 Q3,-8 0,0 Z" fill="#FFF8DC" opacity="0.7"/>
    <!-- Glow -->
    <circle cx="0" cy="-20" r="25" fill="#FF8C00" opacity="0.1"/>
    <!-- Columns -->
    <rect x="-50" y="-50" width="8" height="65" rx="3" fill="#E8DCC8" stroke="#8B7534" stroke-width="1"/>
    <rect x="42" y="-50" width="8" height="65" rx="3" fill="#E8DCC8" stroke="#8B7534" stroke-width="1"/>
  </g>
</svg>
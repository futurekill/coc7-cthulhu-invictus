<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Roman helmet silhouette -->
    <path d="M-35,15 Q-40,-25 0,-50 Q40,-25 35,15 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <path d="M-35,15 Q-40,22 -28,28 Q0,35 28,28 Q40,22 35,15" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Crest -->
    <path d="M0,-50 Q-8,-60 0,-65 Q8,-60 0,-50" fill="#8B1A1A"/>
    <path d="M0,-65 Q20,-68 15,-50 Q10,-42 0,-50" fill="#8B1A1A" opacity="0.8"/>
    <!-- Crossed swords behind -->
    <line x1="-55" y1="40" x2="20" y2="-50" stroke="#C4A035" stroke-width="3" opacity="0.5"/>
    <line x1="55" y1="40" x2="-20" y2="-50" stroke="#C4A035" stroke-width="3" opacity="0.5"/>
    <!-- Eye slits -->
    <rect x="-22" y="18" width="14" height="4" rx="2" fill="#2C1810"/>
    <rect x="8" y="18" width="14" height="4" rx="2" fill="#2C1810"/>
  </g>
</svg>
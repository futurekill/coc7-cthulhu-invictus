<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Laurel wreath -->
    <path d="M0,-55 Q-40,-48 -48,-15 Q-52,15 -35,40 Q-15,58 0,55" fill="none" stroke="#C4A035" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,-55 Q40,-48 48,-15 Q52,15 35,40 Q15,58 0,55" fill="none" stroke="#C4A035" stroke-width="6" stroke-linecap="round"/>
    <!-- Leaves -->
    <g fill="#C4A035" opacity="0.6">
      <ellipse cx="-38" cy="-35" rx="10" ry="5" transform="rotate(-25,-38,-35)"/>
      <ellipse cx="-48" cy="-5" rx="10" ry="5" transform="rotate(-5,-48,-5)"/>
      <ellipse cx="-45" cy="25" rx="10" ry="5" transform="rotate(20,-45,25)"/>
      <ellipse cx="38" cy="-35" rx="10" ry="5" transform="rotate(25,38,-35)"/>
      <ellipse cx="48" cy="-5" rx="10" ry="5" transform="rotate(5,48,-5)"/>
      <ellipse cx="45" cy="25" rx="10" ry="5" transform="rotate(-20,45,25)"/>
    </g>
    <!-- SPQR -->
    <text x="0" y="8" text-anchor="middle" font-size="20" fill="#C4A035" font-family="serif" font-weight="bold">SPQR</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Compass rose -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#C4A035" stroke-width="2"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#C4A035" stroke-width="1" opacity="0.5"/>
    <!-- Cardinal points -->
    <polygon points="0,-45 -8,0 0,-10 8,0" fill="#8B1A1A"/>
    <polygon points="0,45 -8,0 0,10 8,0" fill="#E8DCC8" opacity="0.7"/>
    <polygon points="-45,0 0,-8 -10,0 0,8" fill="#E8DCC8" opacity="0.7"/>
    <polygon points="45,0 0,-8 10,0 0,8" fill="#E8DCC8" opacity="0.7"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#C4A035" stroke="#8B7534" stroke-width="1"/>
    <!-- N marker -->
    <text x="0" y="-52" text-anchor="middle" font-size="14" fill="#C4A035" font-family="serif" font-weight="bold">N</text>
  </g>
</svg>
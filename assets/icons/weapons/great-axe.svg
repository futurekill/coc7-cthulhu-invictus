<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Long handle -->
    <rect x="-4" y="-75" width="8" height="150" rx="3" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Large axe head -->
    <path d="M-4,-75 L-55,-50 Q-65,-35 -55,-15 L-4,-40 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Edge highlight -->
    <path d="M-55,-50 Q-65,-35 -55,-15" fill="none" stroke="#BBCCDD" stroke-width="2"/>
    <!-- Grip wrapping -->
    <line x1="-6" y1="40" x2="6" y2="35" stroke="#8B6914" stroke-width="2"/>
    <line x1="-6" y1="48" x2="6" y2="43" stroke="#8B6914" stroke-width="2"/>
    <line x1="-6" y1="56" x2="6" y2="51" stroke="#8B6914" stroke-width="2"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-35)">
    <!-- Shaft -->
    <rect x="-3" y="-40" width="6" height="100" rx="2" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Narrow head -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-45)">
    <!-- Gladius blade - straight, wide -->
    <path d="M0,-60 L-10,-15 L-10,5 L10,5 L10,-15 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Fuller groove -->
    <line x1="0" y1="-50" x2="0" y2="0" stroke="#AABBCC" stroke-width="2" opacity="0.4"/>
    <!-- Guard -->
    <rect x="-18" y="3" width="36" height="7" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Grip -->
    <rect x="-7" y="10" width="14" height="30" rx="4" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Pommel -->
    <circle cx="0" cy="44" r="9" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
  </g>
</svg>
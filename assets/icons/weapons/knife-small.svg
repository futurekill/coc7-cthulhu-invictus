<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-45)">
    <!-- Small blade -->
    <path d="M0,-40 L8,-5 L-8,-5 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Guard -->
    <rect x="-12" y="-6" width="24" height="5" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1"/>
    <!-- Handle -->
    <rect x="-6" y="-1" width="12" height="30" rx="3" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-25)">
    <!-- Long shaft -->
    <rect x="-3" y="-50" width="6" height="130" rx="2" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Spearhead - leaf shaped -->
    <path d="M0,-75 L-10,-55 L0,-50 L10,-55 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <line x1="0" y1="-72" x2="0" y2="-52" stroke="#AABBCC" stroke-width="1.5" opacity="0.5"/>
    <!-- Butt spike -->
    <polygon points="0,83 -4,78 4,78" fill="#8899AA"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-45)">
    <!-- Long straight blade (spatha) -->
    <path d="M0,-75 L-8,-20 L-8,10 L8,10 L8,-20 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Fuller -->
    <line x1="0" y1="-65" x2="0" y2="5" stroke="#AABBCC" stroke-width="2" opacity="0.4"/>
    <!-- Guard -->
    <rect x="-20" y="8" width="40" height="7" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
    <!-- Grip -->
    <rect x="-7" y="15" width="14" height="32" rx="4" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Pommel -->
    <ellipse cx="0" cy="50" rx="10" ry="7" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
  </g>
</svg>
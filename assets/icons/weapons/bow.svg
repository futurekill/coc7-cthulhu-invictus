<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Simple bow -->
    <path d="M-20,-65 Q-45,0 -20,65" fill="none" stroke="#8B6914" stroke-width="7" stroke-linecap="round"/>
    <!-- String -->
    <line x1="-20" y1="-65" x2="-20" y2="65" stroke="#E8DCC8" stroke-width="1.5"/>
    <!-- Arrow -->
    <line x1="-20" y1="0" x2="55" y2="0" stroke="#8B6914" stroke-width="3"/>
    <polygon points="55,0 45,-6 45,6" fill="#8899AA"/>
    <!-- Fletching -->
    <path d="M-15,-5 L-20,0 L-15,5" fill="none" stroke="#8B1A1A" stroke-width="1.5"/>
  </g>
</svg>
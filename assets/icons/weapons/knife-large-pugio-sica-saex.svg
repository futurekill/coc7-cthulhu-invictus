<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-45)">
    <!-- Blade -->
    <path d="M0,-55 L12,-10 L8,0 L-8,0 L-12,-10 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Fuller -->
    <line x1="0" y1="-45" x2="0" y2="-10" stroke="#AABBCC" stroke-width="2" opacity="0.6"/>
    <!-- Guard -->
    <rect x="-16" y="-2" width="32" height="6" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1"/>
    <!-- Handle -->
    <rect x="-7" y="4" width="14" height="35" rx="3" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Pommel -->
    <circle cx="0" cy="42" r="8" fill="#C4A035" stroke="#8B7534" stroke-width="1"/>
  </g>
</svg>
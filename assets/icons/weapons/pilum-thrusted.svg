<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-30)">
    <!-- Shaft -->
    <rect x="-4" y="-30" width="8" height="110" rx="3" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Iron shank (long thin metal part) -->
    <rect x="-2" y="-65" width="4" height="40" fill="#8899AA" stroke="#667788" stroke-width="1"/>
    <!-- Point -->
    <polygon points="0,-75 -6,-65 6,-65" fill="#8899AA" stroke="#667788" stroke-width="1"/>
  </g>
</svg>
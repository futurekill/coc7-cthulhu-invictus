<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-15)">
    <!-- Wooden staff -->
    <rect x="-5" y="-80" width="10" height="160" rx="5" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Knots -->
    <ellipse cx="2" cy="-40" rx="4" ry="3" fill="#5C4033" opacity="0.6"/>
    <ellipse cx="-2" cy="20" rx="3" ry="3" fill="#5C4033" opacity="0.6"/>
    <!-- Top cap -->
    <circle cx="0" cy="-80" r="7" fill="#C4A035" stroke="#8B7534" stroke-width="1.5"/>
  </g>
</svg>
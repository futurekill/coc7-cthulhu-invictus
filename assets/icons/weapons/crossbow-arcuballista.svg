<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Stock -->
    <rect x="-10" y="-8" width="70" height="16" rx="4" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
    <!-- Bow arms -->
    <path d="M-10,-8 Q-50,-40 -55,-50" fill="none" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>
    <path d="M-10,8 Q-50,40 -55,50" fill="none" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>
    <!-- String -->
    <line x1="-55" y1="-50" x2="-55" y2="50" stroke="#E8DCC8" stroke-width="1.5"/>
    <!-- Trigger mechanism -->
    <rect x="30" y="8" width="8" height="20" rx="2" fill="#8899AA" stroke="#667788" stroke-width="1"/>
    <!-- Bolt -->
    <line x1="-10" y1="0" x2="55" y2="0" stroke="#8B6914" stroke-width="2.5"/>
    <polygon points="58,0 50,-4 50,4" fill="#8899AA"/>
  </g>
</svg>
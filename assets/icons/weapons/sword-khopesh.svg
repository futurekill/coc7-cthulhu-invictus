<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100) rotate(-30)">
    <!-- Khopesh curved blade -->
    <path d="M0,40 L0,-20 Q5,-40 25,-50 Q40,-45 35,-25 Q30,-10 15,-15" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Inner curve highlight -->
    <path d="M0,-15 Q10,-35 25,-42" fill="none" stroke="#BBCCDD" stroke-width="1.5"/>
    <!-- Guard -->
    <rect x="-14" y="38" width="28" height="6" rx="2" fill="#C4A035" stroke="#8B7534" stroke-width="1"/>
    <!-- Handle -->
    <rect x="-6" y="44" width="12" height="28" rx="3" fill="#8B6914" stroke="#5C4033" stroke-width="2"/>
  </g>
</svg>
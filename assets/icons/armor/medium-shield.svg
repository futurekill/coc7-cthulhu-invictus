<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Round shield (clipeus) -->
    <circle cx="0" cy="0" r="55" fill="#8B1A1A" stroke="#C4A035" stroke-width="3"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#C4A035" stroke-width="2"/>
    <!-- Boss -->
    <circle cx="0" cy="0" r="15" fill="#C4A035" stroke="#8B7534" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#8B7534"/>
    <!-- Decorative spokes -->
    <line x1="0" y1="-40" x2="0" y2="-15" stroke="#C4A035" stroke-width="2"/>
    <line x1="0" y1="15" x2="0" y2="40" stroke="#C4A035" stroke-width="2"/>
    <line x1="-40" y1="0" x2="-15" y2="0" stroke="#C4A035" stroke-width="2"/>
    <line x1="15" y1="0" x2="40" y2="0" stroke="#C4A035" stroke-width="2"/>
  </g>
</svg>
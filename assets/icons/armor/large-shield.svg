<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Roman scutum (large rectangular shield) -->
    <rect x="-35" y="-55" width="70" height="110" rx="12" fill="#8B1A1A" stroke="#8B7534" stroke-width="3"/>
    <!-- Gold boss -->
    <circle cx="0" cy="0" r="15" fill="#C4A035" stroke="#8B7534" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#8B7534"/>
    <!-- Wing decorations -->
    <path d="M-30,-30 Q-15,-20 -15,0 Q-15,20 -30,30" fill="none" stroke="#C4A035" stroke-width="2"/>
    <path d="M30,-30 Q15,-20 15,0 Q15,20 30,30" fill="none" stroke="#C4A035" stroke-width="2"/>
    <!-- Edge trim -->
    <rect x="-35" y="-55" width="70" height="110" rx="12" fill="none" stroke="#C4A035" stroke-width="1.5"/>
  </g>
</svg>
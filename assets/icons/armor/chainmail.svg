<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Chainmail shirt shape -->
    <path d="M-35,-50 L-45,-10 L-45,40 L45,40 L45,-10 L35,-50 Z" fill="#8899AA" stroke="#667788" stroke-width="2" opacity="0.8"/>
    <!-- Chain pattern -->
    <g fill="none" stroke="#667788" stroke-width="1" opacity="0.6">
      <circle cx="-20" cy="-30" r="4"/><circle cx="-10" cy="-30" r="4"/><circle cx="0" cy="-30" r="4"/><circle cx="10" cy="-30" r="4"/><circle cx="20" cy="-30" r="4"/>
      <circle cx="-25" cy="-20" r="4"/><circle cx="-15" cy="-20" r="4"/><circle cx="-5" cy="-20" r="4"/><circle cx="5" cy="-20" r="4"/><circle cx="15" cy="-20" r="4"/><circle cx="25" cy="-20" r="4"/>
      <circle cx="-20" cy="-10" r="4"/><circle cx="-10" cy="-10" r="4"/><circle cx="0" cy="-10" r="4"/><circle cx="10" cy="-10" r="4"/><circle cx="20" cy="-10" r="4"/>
      <circle cx="-25" cy="0" r="4"/><circle cx="-15" cy="0" r="4"/><circle cx="-5" cy="0" r="4"/><circle cx="5" cy="0" r="4"/><circle cx="15" cy="0" r="4"/><circle cx="25" cy="0" r="4"/>
      <circle cx="-20" cy="10" r="4"/><circle cx="-10" cy="10" r="4"/><circle cx="0" cy="10" r="4"/><circle cx="10" cy="10" r="4"/><circle cx="20" cy="10" r="4"/>
    </g>
    <!-- Neckline -->
    <path d="M-15,-50 Q0,-40 15,-50" fill="none" stroke="#667788" stroke-width="2"/>
  </g>
</svg>
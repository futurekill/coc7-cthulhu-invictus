<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  
  <g transform="translate(100,100)">
    <!-- Segmented plate armor -->
    <path d="M-35,-45 L-40,40 L40,40 L35,-45 Z" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Horizontal bands -->
    <g fill="none" stroke="#667788" stroke-width="2">
      <path d="M-38,-35 L38,-35"/><path d="M-39,-25 L39,-25"/><path d="M-40,-15 L40,-15"/>
      <path d="M-40,-5 L40,-5"/><path d="M-40,5 L40,5"/><path d="M-40,15 L40,15"/>
      <path d="M-40,25 L40,25"/><path d="M-40,35 L40,35"/>
    </g>
    <!-- Shoulder guards -->
    <path d="M-35,-45 Q-55,-40 -60,-25 L-40,-20" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <path d="M35,-45 Q55,-40 60,-25 L40,-20" fill="#8899AA" stroke="#667788" stroke-width="2"/>
    <!-- Clasps -->
    <circle cx="0" cy="-35" r="3" fill="#C4A035"/>
    <circle cx="0" cy="-25" r="3" fill="#C4A035"/>
    <circle cx="0" cy="-15" r="3" fill="#C4A035"/>
  </g>
</svg>